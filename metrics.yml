# Metric registry — hand-curated for the take-home prototype.
#
# In production this would be sourced from dbt Semantic Layer / MetricFlow /
# Cube / WrenAI MDL. Here it is hand-curated. Each entry powers:
#   - SQL Agent: source priority + alternatives (grounded prompt context)
#   - Quality Agent Layer B: cross-source reconciliation
#
# Schema:
#   id: stable id, matches BusinessQuestion.id
#   metric_name: short name
#   cross_source: required | optional | disabled   # Decision 5
#   period_start: 'YYYY-MM-DD'                     # inclusive lower bound
#   period_end: 'YYYY-MM-DD'                       # exclusive upper bound
#   primary:
#     table: sqlite table name
#     column: metric column
#     period_column: column to filter on
#     extra_filters: list of SQL WHERE fragments
#     breakdown: column to group by (optional)
#     aggregator: SUM | COUNT_DISTINCT | RAW       # how to aggregate primary
#   alternatives: list of alternative source definitions, same shape as primary, plus notes
#   disagreement_threshold_pct: 1.0                # default; override per-metric
#   notes_for_layer_b: free-form notes given to the LLM hypothesis prompt

metrics:

  - id: q1_gtv_idr_by_asset_oct_2025
    metric_name: gtv_idr_by_asset_class
    cross_source: required
    period_start: '2025-10-01'
    period_end: '2025-11-01'
    primary:
      table: fct_trading_daily
      column: gtv_idr
      period_column: transaction_date
      extra_filters: []
      breakdown: asset_class
      aggregator: SUM
    alternatives:
      - table: agg_monthly_biz_summary
        column: gtv_idr
        period_column: month
        extra_filters: ["asset_class != 'Total'"]
        breakdown: asset_class
        aggregator: SUM
        notes: "Monthly aggregate sourced from fct_trading_daily; should match exactly when summed by asset_class."
      - table: mart_ops_dashboard
        column: gtv_idr
        period_column: month
        extra_filters: ["asset_class != 'Total'"]
        breakdown: asset_class
        aggregator: SUM
        notes: "Ops mart filters status != 'failed' (includes pending). Expected to be HIGHER than fct_trading_daily by ~10-15%."
    disagreement_threshold_pct: 1.0

  - id: q2_gtv_usd_oct_2025
    metric_name: total_gtv_usd
    cross_source: required
    period_start: '2025-10-01'
    period_end: '2025-11-01'
    primary:
      table: fct_trading_daily
      column: gtv_usd
      period_column: transaction_date
      extra_filters: []
      breakdown: null
      aggregator: SUM
    alternatives:
      - table: agg_monthly_biz_summary
        column: gtv_usd
        period_column: month
        extra_filters: ["asset_class = 'Total'"]
        breakdown: null
        aggregator: SUM
        notes: "Total row for the month; sourced from fct_trading_daily and should match exactly."
      - table: mart_ops_dashboard
        column: gtv_usd_reported
        period_column: month
        extra_filters: ["asset_class = 'Total'"]
        breakdown: null
        aggregator: SUM
        notes: "Uses fixed 15,000 IDR/USD conversion AND status != 'failed'. Expected to disagree by 15-25%."
    disagreement_threshold_pct: 1.0

  - id: q3_mtu_oct_2025
    metric_name: monthly_transacting_users
    # MTU has 3 valid definitions, all surfaced in SQLAgentAnswer.interpretation_choices.
    # This is a DEFINITIONAL difference, not a data-quality disagreement, so Layer B is disabled.
    cross_source: disabled
    period_start: '2025-10-01'
    period_end: '2025-11-01'
    primary:
      table: agg_monthly_biz_summary
      column: mtu
      period_column: month
      extra_filters: ["asset_class = 'Total'"]
      breakdown: null
      aggregator: RAW
    alternatives: []
    notes_for_layer_b: "MTU has three definitions (AUM-derived, raw-completed-traders, Mixpanel). Differences are by design, not data quality. Surfaced in interpretation_choices instead."

  - id: q4_transaction_count_by_asset_oct_2025
    metric_name: transaction_count_by_asset_class
    cross_source: required
    period_start: '2025-10-01'
    period_end: '2025-11-01'
    primary:
      table: fct_trading_daily
      column: transaction_count
      period_column: transaction_date
      extra_filters: []
      breakdown: asset_class
      aggregator: SUM
    alternatives:
      - table: agg_monthly_biz_summary
        column: transaction_count
        period_column: month
        extra_filters: ["asset_class != 'Total'"]
        breakdown: asset_class
        aggregator: SUM
        notes: "Monthly aggregate sourced from fct_trading_daily; should match exactly."
      - table: mart_ops_dashboard
        column: total_transactions
        period_column: month
        extra_filters: ["asset_class != 'Total'"]
        breakdown: asset_class
        aggregator: SUM
        notes: "Ops mart filters status != 'failed'. Expected to be HIGHER than fct_trading_daily by ~10-15%."
    disagreement_threshold_pct: 1.0

  - id: q5_gtv_mom_trend_oct_dec_2025
    metric_name: gtv_idr_month_on_month_trend
    cross_source: required
    period_start: '2025-10-01'
    period_end: '2026-01-01'
    primary:
      table: fct_trading_daily
      column: gtv_idr
      period_column: transaction_date
      extra_filters: []
      breakdown: month_bucket   # special: substr(date, 1, 7) — generic Layer B handles this
      aggregator: SUM
    alternatives:
      - table: agg_monthly_biz_summary
        column: gtv_idr
        period_column: month
        extra_filters: ["asset_class = 'Total'"]
        breakdown: month_bucket
        aggregator: SUM
        notes: "Monthly Total row sourced from fct_trading_daily. Known issue: December 2025 Total row appears stale/incorrect — disagrees with fct by ~3.5%."
    disagreement_threshold_pct: 1.0
    notes_for_layer_b: "December 2025 Total row in agg_monthly_biz_summary is known stale per data team backlog."
